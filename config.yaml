app:
  env: development
  name: todo-api
  version: 1.0.0

http:
  port: 8080
  read_timeout: 15s
  write_timeout: 15s
  idle_timeout: 60s
  shutdown_timeout: 10s

database:
  dsn: postgres://todo:todo@localhost:5432/todo?sslmode=disable
  max_open_conns: 25
  max_idle_conns: 25
  conn_max_lifetime: 5m

jwt:
  secret: change-me-in-prod-32-bytes-min
  access_ttl: 15m
  refresh_ttl: 168h

log:
  level: info
  format: json
