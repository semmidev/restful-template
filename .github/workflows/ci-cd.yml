name: CI/CD

env:
  DOCKER_IMAGE: sammidev/restful-template

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

# Batalkan run lama jika ada push baru ke branch yang sama
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────
  # Lint
  # ─────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
          cache: true

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2
          args: --timeout=5m

  # ─────────────────────────────────────────
  # Test
  # ─────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
          cache: true

      - name: Run unit tests with coverage
        run: make test GOFLAGS="-coverprofile=coverage.out -covermode=atomic"

      - name: Run integration tests
        run: make test-integration

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage.out
          retention-days: 7

  # ─────────────────────────────────────────
  # Build & Push Docker image to Docker Hub
  # ─────────────────────────────────────────
  build:
    name: Build & Push image
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    outputs:
      image_tag: ${{ steps.vars.outputs.short_sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set short SHA
        id: vars
        run: echo "short_sha=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_IMAGE }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Scan image untuk CVE setelah push
      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.DOCKER_IMAGE }}:${{ steps.vars.outputs.short_sha }}
          format: table
          exit-code: '1'
          severity: CRITICAL,HIGH
          ignore-unfixed: true

  # ─────────────────────────────────────────
  # Deploy to DigitalOcean Droplet
  # ─────────────────────────────────────────
  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    environment:
      name: production
      url: ${{ vars.APP_URL }}

    steps:
      - name: Checkout (for docker-compose.yml)
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.SERVER_IP }} >> ~/.ssh/known_hosts

      - name: Copy files to server
        run: |
          scp -i ~/.ssh/deploy_key \
            infra/docker-compose.yml \
            deploy@${{ secrets.SERVER_IP }}:~/app/

      - name: Deploy
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          IMAGE_TAG: ${{ needs.build.outputs.image_tag }}
        run: |
          ssh -i ~/.ssh/deploy_key deploy@${{ secrets.SERVER_IP }} bash -s \
            "$DOCKERHUB_USERNAME" \
            "$DOCKERHUB_TOKEN" \
            "$IMAGE_TAG" << 'ENDSSH'

            DOCKERHUB_USERNAME=$1
            DOCKERHUB_TOKEN=$2
            IMAGE_TAG=$3

            set -euo pipefail
            cd ~/app

            # Simpan IMAGE_TAG sebelumnya untuk rollback
            PREV_TAG=$(grep "^IMAGE_TAG=" .env 2>/dev/null | cut -d= -f2 || echo "")
            echo "Previous tag: ${PREV_TAG:-none}"

            # Login ke Docker Hub via credential helper (tidak menyimpan plain ke config.json)
            echo "$DOCKERHUB_TOKEN" | docker login \
              --username "$DOCKERHUB_USERNAME" \
              --password-stdin 2>/dev/null

            # Update IMAGE_TAG di .env
            if grep -q "^IMAGE_TAG=" .env 2>/dev/null; then
              sed -i "s/^IMAGE_TAG=.*/IMAGE_TAG=$IMAGE_TAG/" .env
            else
              echo "IMAGE_TAG=$IMAGE_TAG" >> .env
            fi

            # Simpan prev tag untuk rollback
            if [ -n "$PREV_TAG" ]; then
              echo "PREV_IMAGE_TAG=$PREV_TAG" > .env.prev
            fi

            # Pull image baru
            docker compose pull app

            # Rolling restart — db, redis, observability stack tetap berjalan
            docker compose up -d --no-deps --remove-orphans app

            # Hapus credential segera setelah selesai
            docker logout

            # Cleanup old images
            docker image prune -f

            echo "✅ Deploy complete! Image: $IMAGE_TAG"
            docker compose ps
          ENDSSH

      - name: Health check with retry
        run: |
          MAX_RETRIES=10
          RETRY_INTERVAL=10
          ATTEMPT=0

          echo "⏳ Waiting for service to be healthy..."

          until [ $ATTEMPT -ge $MAX_RETRIES ]; do
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              --max-time 10 \
              ${{ vars.APP_URL }}/api/v1/health || echo "000")

            if [ "$HTTP_STATUS" = "200" ]; then
              echo "✅ Health check passed (HTTP $HTTP_STATUS) on attempt $((ATTEMPT + 1))"
              exit 0
            fi

            ATTEMPT=$((ATTEMPT + 1))
            echo "⚠️  Attempt $ATTEMPT/$MAX_RETRIES failed (HTTP $HTTP_STATUS). Retrying in ${RETRY_INTERVAL}s..."
            sleep $RETRY_INTERVAL
          done

          echo "❌ Health check failed after $MAX_RETRIES attempts"
          exit 1

      - name: Rollback on failure
        if: failure()
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          ssh -i ~/.ssh/deploy_key deploy@${{ secrets.SERVER_IP }} bash -s \
            "$DOCKERHUB_USERNAME" \
            "$DOCKERHUB_TOKEN" << 'ENDSSH'

            DOCKERHUB_USERNAME=$1
            DOCKERHUB_TOKEN=$2

            set -euo pipefail
            cd ~/app

            if [ ! -f .env.prev ]; then
              echo "⚠️  No previous tag found, cannot rollback."
              exit 1
            fi

            PREV_TAG=$(grep "^PREV_IMAGE_TAG=" .env.prev | cut -d= -f2)

            if [ -z "$PREV_TAG" ]; then
              echo "⚠️  Previous tag is empty, cannot rollback."
              exit 1
            fi

            echo "🔄 Rolling back to: $PREV_TAG"

            echo "$DOCKERHUB_TOKEN" | docker login \
              --username "$DOCKERHUB_USERNAME" \
              --password-stdin 2>/dev/null

            # Kembalikan IMAGE_TAG ke versi sebelumnya
            sed -i "s/^IMAGE_TAG=.*/IMAGE_TAG=$PREV_TAG/" .env

            docker compose pull app
            docker compose up -d --no-deps --remove-orphans app

            docker logout
            docker image prune -f

            echo "✅ Rollback complete! Reverted to: $PREV_TAG"
            docker compose ps
          ENDSSH

