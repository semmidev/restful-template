name: CI/CD

env:
  DOCKER_IMAGE: sammidev/restful-template

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2
          args: --timeout=5m

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'

      - name: Run unit tests
        run: make test

      - name: Run integration tests
        run: make test-integration

  # ─────────────────────────────────────────
  # Build & Push Docker image to Docker Hub
  # ─────────────────────────────────────────
  build:
    name: Build & Push image
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    outputs:
      image_tag: ${{ steps.vars.outputs.short_sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set short sha
        id: vars
        run: echo "short_sha=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_IMAGE }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────
  # Deploy to DigitalOcean Droplet
  # ─────────────────────────────────────────
  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    environment:
      name: production
      url: ${{ vars.APP_URL }}

    steps:
      - name: Checkout (for docker-compose.yml)
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.SERVER_IP }} >> ~/.ssh/known_hosts

      - name: Copy files to server
        run: |
          scp -i ~/.ssh/deploy_key \
            infra/docker-compose.yml \
            deploy@${{ secrets.SERVER_IP }}:~/app/

      - name: Deploy
        run: |
          ssh -i ~/.ssh/deploy_key deploy@${{ secrets.SERVER_IP }} << 'ENDSSH'
            set -e
            cd ~/app

            # Login to Docker Hub
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

            # Update IMAGE_TAG in the existing .env file to persist across reboots
            if grep -q "^IMAGE_TAG=" .env; then
              sed -i "s/^IMAGE_TAG=.*/IMAGE_TAG=${{ needs.build.outputs.image_tag }}/" .env
            else
              echo "IMAGE_TAG=${{ needs.build.outputs.image_tag }}" >> .env
            fi

            # Pull the new image
            docker compose pull app

            # Rolling restart — keeps db, redis, and observability stack running
            docker compose up -d --no-deps --remove-orphans app

            # Cleanup old images
            docker image prune -f

            echo "✅ Deploy complete! Image: ${{ needs.build.outputs.image_tag }}"
            docker compose ps
          ENDSSH

      - name: Health check
        run: |
          sleep 15

          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 30 \
            ${{ vars.APP_URL }}/api/v1/health || echo "000")

          if [ "$HTTP_STATUS" = "200" ]; then
            echo "✅ Health check passed (HTTP $HTTP_STATUS)"
          else
            echo "❌ Health check failed (HTTP $HTTP_STATUS)"
            exit 1
          fi

      - name: Notify on failure
        if: failure()
        run: |
          echo "Deploy failed! Check logs in GitHub Actions."
