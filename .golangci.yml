# yaml-language-server: $schema=https://json.schemastore.org/golangci-lint.json
version: "2"

run:
  timeout: 5m
  issues-exit-code: 1
  tests: true

formatters:
  enable:
    - gofmt
    - goimports

linters:
  default: none
  enable:
    - govet
    - errcheck
    - staticcheck
    - gosec
    - gocyclo
    - gocognit
    - misspell
    - unconvert
    - unparam
    - prealloc
    - bodyclose
  settings:
    govet:
      enable-all: true
      disable:
        - fieldalignment
        - shadow
    errcheck:
      check-type-assertions: true
      check-blank: false
      exclude-functions:
        - (net/http.ResponseWriter).Write
        - github.com/danielgtaylor/huma/v2.WriteErr
        - (*github.com/jackc/pgx/v5.Tx).Rollback
    gocyclo:
      min-complexity: 30
    gocognit:
      min-complexity: 60
    gosec:
      excludes:
        - G115
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - gocyclo
          - errcheck
          - gosec
          - gocognit
