services:
  # ─────────────────────────────────────────
  # App — Go binary (distroless image)
  # ─────────────────────────────────────────
  app:
    image: ${DOCKER_IMAGE:-sammidev/restful-template}:${IMAGE_TAG:-latest}
    container_name: restful-template
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"   # Only localhost — Caddy exposes externally
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      alloy:
        condition: service_started
    networks:
      - internal
      - monitoring
    # Note: distroless image has no shell/curl. Health is monitored externally by Caddy
    # and by the depends_on conditions on db/redis. restart: unless-stopped handles recovery.
    healthcheck:
      test: ["CMD-SHELL", "true"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ─────────────────────────────────────────
  # Scheduler — Cron jobs
  # ─────────────────────────────────────────
  scheduler:
    image: ${SCHEDULER_IMAGE:-sammidev/restful-template-scheduler}:${IMAGE_TAG:-latest}
    container_name: restful-template-scheduler
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      app:
        condition: service_started
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      alloy:
        condition: service_started
    networks:
      - internal
      - monitoring
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ─────────────────────────────────────────
  # Worker — Asynq background tasks
  # ─────────────────────────────────────────
  worker:
    image: ${WORKER_IMAGE:-sammidev/restful-template-worker}:${IMAGE_TAG:-latest}
    container_name: restful-template-worker
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      app:
        condition: service_started
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      alloy:
        condition: service_started
    networks:
      - internal
      - monitoring
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ─────────────────────────────────────────
  # PostgreSQL
  # ─────────────────────────────────────────
  db:
    image: postgres:18-alpine
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-todo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-todo}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-todo} -d ${POSTGRES_DB:-todo}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  # ─────────────────────────────────────────
  # Redis — caching and rate limiting
  # ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --requirepass ${REDIS_PASSWORD:-}
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  # ─────────────────────────────────────────
  # Mailpit — SMTP testing and email UI
  # ─────────────────────────────────────────
  mailpit:
    image: axllent/mailpit:v1.29
    container_name: mailpit
    restart: unless-stopped
    ports:
      - "127.0.0.1:1025:1025"
      - "127.0.0.1:8025:8025"
    networks:
      - internal
      - monitoring
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  # ═════════════════════════════════════════
  # Observability Stack (Grafana OSS)
  # ═════════════════════════════════════════

  # ─────────────────────────────────────────
  # Prometheus — metrics scraping
  # ─────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "127.0.0.1:9090:9090"   # Accessible only from localhost
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
      - "--web.enable-remote-write-receiver"   # Required by Tempo metrics generator
    volumes:
      - ../config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - monitoring
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  # ─────────────────────────────────────────
  # Grafana — dashboards and visualization
  # ─────────────────────────────────────────
  grafana:
    image: grafana/grafana-oss:latest
    container_name: grafana
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"   # Expose via Caddy if needed
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-changeme}
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-http://localhost:3000}
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_AUTH_DISABLE_LOGIN_FORM: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ../config/grafana/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
      - ../config/grafana/dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml:ro
      - ../config/grafana/api-dashboard.json:/etc/grafana/dashboards/api-dashboard.json:ro
    networks:
      - monitoring
    depends_on:
      - prometheus
      - loki
      - tempo
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  # ─────────────────────────────────────────
  # Loki — log aggregation
  # ─────────────────────────────────────────
  loki:
    image: grafana/loki:3.3.2
    container_name: loki
    restart: unless-stopped
    user: "root"
    ports:
      - "127.0.0.1:3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ../config/loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/tmp/loki
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - monitoring
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  # ─────────────────────────────────────────
  # Tempo — distributed tracing
  # ─────────────────────────────────────────
  tempo:
    image: grafana/tempo:main-814c1c6
    container_name: tempo
    user: root
    restart: unless-stopped
    command: "-target=all -config.file=/etc/tempo.yaml"
    volumes:
      - ../config/tempo/tempo.yml:/etc/tempo.yaml:ro
      - tempo_data:/tmp/tempo
    ports:
      - "127.0.0.1:3200:3200"   # Tempo HTTP API
    networks:
      - monitoring
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  # ─────────────────────────────────────────
  # Alloy — OpenTelemetry collector
  # Receives OTLP from the app, routes:
  #   traces  → Tempo
  #   logs    → Loki  (Docker log discovery)
  # ─────────────────────────────────────────
  alloy:
    image: grafana/alloy:latest
    container_name: alloy
    restart: unless-stopped
    privileged: true   # Required for Docker socket access (log discovery)
    ports:
      - "127.0.0.1:12345:12345"   # Alloy UI
      - "4317:4317"               # OTLP gRPC — receives from app
      - "4318:4318"               # OTLP HTTP
    command:
      - run
      - --server.http.listen-addr=0.0.0.0:12345
      - /etc/alloy/config.alloy
    volumes:
      - ../config/alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - monitoring
    depends_on:
      - loki
      - tempo
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  loki_data:
    driver: local
  tempo_data:
    driver: local

networks:
  internal:
    driver: bridge
  monitoring:
    driver: bridge
